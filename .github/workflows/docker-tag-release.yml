name: Docker Release On Tag

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: DOCKERHUB
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN != '' && secrets.DOCKERHUB_TOKEN || secrets.DOCKER_TOKEN }}
      ANDROID_SIGNING_STORE_FILE: ${{ github.workspace }}/mobile/android/build-support/docstore-release.keystore
      ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
      ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
      ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive release metadata
        run: |
          echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "GIT_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Decode Android signing keystore
        env:
          ANDROID_SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -n "${ANDROID_SIGNING_KEYSTORE_BASE64}" ]; then
            printf '%s' "${ANDROID_SIGNING_KEYSTORE_BASE64}" | base64 --decode > "${ANDROID_SIGNING_STORE_FILE}"
          else
            echo "ANDROID_SIGNING_KEYSTORE_BASE64 not set; generating ephemeral CI signing keystore."
            keytool -genkeypair \
              -keystore "${ANDROID_SIGNING_STORE_FILE}" \
              -storepass "${ANDROID_SIGNING_STORE_PASSWORD:-android}" \
              -keypass "${ANDROID_SIGNING_KEY_PASSWORD:-android}" \
              -alias "${ANDROID_SIGNING_KEY_ALIAS:-docstore}" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 3650 \
              -dname "CN=Docstore, OU=Mobile, O=De Knijf, L=Oosterzele, S=East Flanders, C=BE"
          fi

      - name: Build Android APK and publish into static/mobile
        run: make mobile-android-publish

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: docstore-android-${{ env.APP_VERSION }}
          path: |
            static/mobile/docstore-mobile-latest.apk
            static/mobile/docstore-mobile-${{ env.APP_VERSION }}.apk
            static/mobile/latest.json

      - name: Validate Docker Hub credentials
        run: |
          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            echo "Missing Docker Hub username secret. Set DOCKERHUB_USERNAME (or DOCKER_USERNAME)."
            exit 1
          fi
          if [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "Missing Docker Hub token secret. Set DOCKERHUB_TOKEN (or DOCKER_TOKEN)."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: deknijf/docstore:${{ github.ref_name }}
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
            GIT_TAG=${{ env.GIT_TAG }}
