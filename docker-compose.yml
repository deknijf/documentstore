services:
  documentstore:
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION}
        GIT_TAG: ${GIT_TAG}
    #image: deknijf/docstore:${GIT_TAG}
    container_name: documentstore
    ports:
      - "${HOST_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
